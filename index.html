<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css">
    <title>Quiz Spel grupp 2</title>
</head>

<body>
    <!-- Header -->
    <header class="quiz-header">
        <img src="images/logo-grit.png" alt="Grit logo" class="quiz-logo">
    </header>

    <main class="quiz-container" id="quiz-container">

        <!-- Progress-->
        <div class="top-row">
            <div class="progress-circle" aria-live="polite" aria-label="progress i quizet"><span id="progress">1</span>/<span id="total">10</span></div>

            <div class="question-box" id="question" aria-live="polite" aria-label="Aktuell fråga">
                Frågor
            </div>
        </div>

        <!-- Answer Buttons -->
        <form class="answers" id="answers" aria-labelledby="question">  
            <button class="answer-btn" type="submit" aria-label="Svar 1">Answer 1</button>
            <button class="answer-btn" type="submit" aria-label="Svar 2">Answer 2</button>
            <button class="answer-btn" type="submit" aria-label="Svar 3">Answer 3</button>
            <button class="answer-btn" type="submit" aria-label="Svar 4">Answer 4</button>
        </form>
         
        <!-- Score and Next Buttons -->
        <div class="bottom-row">
            <div class="score" id="score" aria-live="polite" aria-label="actual result">Poäng: 0%</div>

            <div class="buttons">
                <button class="next-btn" aria-label="Gå till nästa fråga" id="nextBtn" disabled>Nästa</button>
            </div>
        </div>

    </main>

    <!-- Result Section -->
    <section id="result" class="result hidden" aria-labelledby="result-heading">
        <h2>Resultat</h2>
        <p id="result-score"></p>

        <button id="restartBtn" aria-label="Starta om quizet"> Starta om</button>

        <div class="summary-item" id="summary" aria-live="polite"></div>
    </section>

    <script src="scripts/objects.js"></script>
    <script src="scripts/index.js"></script>

</body>

</html>

<!--aria-live = "polite" för att automatiskt läsa upp ändringar i skärmen ; 
väntar på att användaren är klar med att läsa upp   -->
