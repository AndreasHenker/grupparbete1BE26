<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizspel</title>
    <link rel="stylesheet" href="styles/quiz1.css">
</head>

<body>
    <div class="quiz-container" id="quiz-container">

        <header class="quiz-header">
            <img src="images/logo-grit.png" alt="Grit logo" class="quiz-logo">
        </header>

        <div class="top-row">
            <div class="progress-circle"><span id="progress">1</span>/10</div>

            <div class="question-box" id="question">
                Frågor
            </div>
        </div>

        <form class="answers" id="answers"> 
            <button class="answer-btn">Answer 1</button>
            <button class="answer-btn">Answer 2</button>
            <button class="answer-btn">Answer 3</button>
            <button class="answer-btn">Answer 4</button>
        </form>

        <div class="bottom-row">
            <div class="score" id="score">Score: 0%</div>

            <div class="buttons">
                <button class="next-btn" id="nextBtn" disabled>Nästa</button>
            </div>
        </div>

    </div>
    <div id="result" class="result hidden">
        <h2>Resultat</h2>
        <p id="result-score"></p>
        <button id="restartBtn"> Starta om</button>
    </div>

    <script src="script/objects.js"></script>
    <script src="script/index.js"></script>
</body>

</html>
